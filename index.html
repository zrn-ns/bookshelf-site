<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookshelf</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/jszip/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>Bookshelf</h1>
      <p><a href="https://github.com/zrn-ns/book-writing-skill" class="header-link">/book-writingスキル</a>で生成した技術書コレクション</p>
    </header>
    <div class="sort-bar">
      <span class="sort-label">並び替え:</span>
      <button class="sort-btn active" data-sort="title" onclick="sortBooks('title')">タイトル</button>
      <button class="sort-btn" data-sort="date" onclick="sortBooks('date')">新しい順</button>
      <button class="sort-btn" data-sort="time" onclick="sortBooks('time')">読了時間</button>
    </div>
    <div id="book-list" class="book-list"></div>
    <footer>
      <p>AIに本を書かせて読む利点は、関心のあるテーマについて情報を収集・体系化した資料を短時間で手に入れられることです。断片的なドキュメントやブログ記事を自分でつなぎ合わせる代わりに、構造化されたリファレンスとして一気に摂取できます。</p>
      <p class="footer-links">
        EPUB形式。お手持ちのリーダーアプリで閲覧できます。
        <a href="https://github.com/zrn-ns/bookshelf-site">GitHub</a>
      </p>
    </footer>
  </div>

  <div id="reader-modal" class="reader-modal">
    <div class="reader-header">
      <span id="reader-title" class="reader-title"></span>
      <button class="reader-close" onclick="closeReader()">×</button>
    </div>
    <div class="reader-body">
      <button class="reader-nav reader-prev" onclick="rendition.prev()">‹</button>
      <div id="reader-area"></div>
      <button class="reader-nav reader-next" onclick="rendition.next()">›</button>
    </div>
  </div>
  <script>
    function renderBooks(books) {
      const list = document.getElementById('book-list');
      list.innerHTML = '';

      books.forEach((book, i) => {
        const tocHtml = book.toc.map(ch => `<li>${ch}</li>`).join('');
        const tocId = `toc-${i}`;

        const coverHtml = book.coverImage
          ? `<img class="book-cover" src="${book.coverImage}" alt="${book.title}">`
          : `<div class="book-cover-placeholder" style="background:${book.color}"></div>`;

        list.innerHTML += `
          <div class="book-item">
            ${coverHtml}
            <div class="book-info">
              <div class="book-title">${book.title}</div>
              <div class="book-subtitle">${book.subtitle}</div>
              <div class="book-meta">
                <span>${book.date}</span>
                <span>${book.size}</span>
                <span>${book.readingTime}</span>
              </div>
              <div class="toc" id="${tocId}">
                <ol>${tocHtml}</ol>
              </div>
            </div>
            <div class="book-actions">
              <button class="btn-read" onclick="openReader('epubs/${book.filename}', '${book.title.replace(/'/g, "\\'")}')">読む</button>
              <a class="btn-download" href="epubs/${book.filename}" download>↓ EPUB</a>
              <button class="btn-toc" onclick="document.getElementById('${tocId}').classList.toggle('open')">目次</button>
            </div>
          </div>
        `;
      });
    }

    let allBooks = [];

    async function init() {
      const res = await fetch('books.json');
      allBooks = await res.json();
      renderBooks(allBooks);
    }

    function sortBooks(key) {
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`[data-sort="${key}"]`).classList.add('active');

      const sorted = [...allBooks];
      if (key === 'title') {
        sorted.sort((a, b) => a.title.localeCompare(b.title, 'ja'));
      } else if (key === 'date') {
        sorted.sort((a, b) => b.date.localeCompare(a.date));
      } else if (key === 'time') {
        sorted.sort((a, b) => a.readingTimeMinutes - b.readingTimeMinutes);
      }
      renderBooks(sorted);
    }

    init();

    let book = null;
    let rendition = null;

    function openReader(url, title) {
      document.getElementById('reader-title').textContent = title;
      const modal = document.getElementById('reader-modal');
      modal.classList.add('open');
      document.body.style.overflow = 'hidden';

      // 前のインスタンスを破棄
      if (book) { book.destroy(); }

      const area = document.getElementById('reader-area');
      area.innerHTML = '';

      book = ePub(url);
      const readerBody = area.parentElement;
      const height = readerBody.clientHeight;
      const width = area.clientWidth;
      rendition = book.renderTo(area, {
        width: width,
        height: height,
        spread: 'none'
      });
      rendition.display();

      // キーボードナビゲーション
      rendition.on('keyup', handleKey);
      document.addEventListener('keyup', handleKey);
    }

    function closeReader() {
      const modal = document.getElementById('reader-modal');
      modal.classList.remove('open');
      document.body.style.overflow = '';
      document.removeEventListener('keyup', handleKey);
      if (book) { book.destroy(); book = null; rendition = null; }
    }

    function handleKey(e) {
      if (e.key === 'Escape') { closeReader(); return; }
      if (!rendition) return;
      if (e.key === 'ArrowLeft') rendition.prev();
      if (e.key === 'ArrowRight') rendition.next();
    }
  </script>
</body>
</html>
